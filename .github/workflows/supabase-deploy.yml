name: Deploy Supabase (migrations + edge functions)

on:
  push:
    branches: [ main ]
    paths:
      - "supabase/migrations/**"
      - "supabase/functions/**"
      - ".github/workflows/supabase-deploy.yml"

concurrency:
  group: supabase-deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Supabase CLI
        run: npm i -g supabase

      - name: Supabase login (token)
        run: supabase login --token "${SUPABASE_ACCESS_TOKEN}"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Link project
        run: supabase link --project-ref "${SUPABASE_PROJECT_REF}"
        env:
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}

      # Apply SQL migrations to the linked project DB
      - name: Apply migrations
        run: supabase db push
        env:
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

      # Deploy edge functions that changed (safe to redeploy)
      - name: Deploy whatsapp-templates
        run: supabase functions deploy whatsapp-templates

      - name: Deploy whatsapp-webhook
        run: supabase functions deploy whatsapp-webhook

